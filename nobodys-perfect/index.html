<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Nobody's Perfect · Kilian Fäustle</title>
<meta name="description" content="Das Bluff-Quiz für ein Handy und die ganze Gruppe. Schätzen, bluffen, die anderen reinlegen.">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Roboto+Flex:opsz,wght@8..144,300..900&display=swap" rel="stylesheet">
<style>
:root{
  --font-serif:'Instrument Serif',Georgia,serif;
  --font-sans:'Roboto Flex',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --sage-50:#ebf3ef;--sage-100:#cfe3d8;--sage-500:#1a9b82;--sage-600:#14816c;--sage-700:#106554;
  --blue-50:#ebf3f9;--blue-100:#d1e3f0;--blue-500:#408fbc;--blue-700:#275f80;
  --coral-50:#fdece5;--coral-100:#fad4c4;--coral-500:#ec7a5b;--coral-600:#d9603f;--coral-700:#b34c30;
  --cream:#f9f6f4;--snow:#fdfbf8;--paper:#f4f0eb;
  --sand:#d9d3c9;--stone:#6b655d;--stone-light:#a8a29a;--graphite:#4a453f;--ink:#1a1918;
  --border:#e4ddd2;--border-subtle:#efeae2;
  --radius-sm:10px;--radius-md:16px;--radius-lg:24px;--radius-pill:999px;
  --shadow-sm:0 2px 6px rgba(30,20,10,.06),0 1px 2px rgba(30,20,10,.04);
  --shadow-md:0 6px 16px rgba(30,20,10,.08),0 2px 4px rgba(30,20,10,.04);
  --ease-out:cubic-bezier(.22,1,.36,1);--dur:220ms;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--cream);color:var(--ink);
  font-family:var(--font-sans);font-size:16px;line-height:1.55;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  min-height:100vh;
}
.wrap{max-width:560px;margin:0 auto;padding:0 20px 48px}
button{font-family:inherit}
header.site{padding:20px 0 4px}
.brand{display:flex;align-items:center;gap:10px}
.wordmark{font-family:var(--font-serif);font-style:italic;font-size:20px;color:var(--ink);text-decoration:none}
.tag{font-size:12px;color:var(--stone);font-weight:600;letter-spacing:.06em;text-transform:uppercase}

h1{
  font-family:var(--font-serif);font-weight:400;font-size:clamp(36px,11vw,52px);
  line-height:1.04;letter-spacing:-.02em;margin:14px 0 10px;
}
h1 em{font-style:italic;color:var(--coral-500)}
.lede{font-size:16.5px;line-height:1.6;color:var(--graphite);margin:0 0 22px;max-width:48ch}

.card{
  background:var(--snow);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:22px;box-shadow:var(--shadow-sm);margin:0 0 16px;
}
.card h2{font-family:var(--font-sans);font-weight:700;font-size:18px;margin:0 0 10px}
.card p{margin:0 0 10px;color:var(--graphite);font-size:15px;line-height:1.6}
.card p:last-child{margin-bottom:0}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
  background:var(--sage-600);color:#fff;border:none;cursor:pointer;
  font-family:var(--font-sans);font-weight:700;font-size:17px;
  border-radius:var(--radius-pill);padding:16px 22px;box-shadow:var(--shadow-md);
  transition:background var(--dur) var(--ease-out),transform var(--dur) var(--ease-out),opacity var(--dur);
  -webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(.98)}
.btn:hover{background:var(--sage-700)}
.btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.btn.coral{background:var(--coral-500)}
.btn.coral:hover{background:var(--coral-600)}
.btn.ghost{
  background:transparent;color:var(--stone);box-shadow:none;border:1.5px solid var(--border);
  font-weight:600;font-size:15px;padding:12px 20px;
}
.btn.ghost:hover{color:var(--graphite);border-color:var(--sand)}
.btn.small{width:auto;padding:10px 18px;font-size:14.5px;box-shadow:none}

.row{display:flex;gap:10px;align-items:center}
.row.wrap-gap{flex-wrap:wrap}

input[type=text],input[type=number]{
  width:100%;font-family:var(--font-sans);font-size:17px;font-weight:500;color:var(--ink);
  background:var(--paper);border:1.5px solid var(--sand);border-radius:14px;
  padding:14px 16px;transition:border-color var(--dur) var(--ease-out);
}
input[type=text]:focus,input[type=number]:focus{outline:none;border-color:var(--sage-500);background:var(--snow)}
input[type=number]{font-variant-numeric:tabular-nums}
select{
  font-family:var(--font-sans);font-size:15.5px;font-weight:600;color:var(--ink);
  background:var(--paper);border:1.5px solid var(--sand);border-radius:12px;padding:10px 14px;
}

.eyebrow{
  font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--stone);margin:0 0 10px;
}

/* Player chips */
.player-list{display:flex;flex-direction:column;gap:8px;margin:14px 0 0}
.player-chip{
  display:flex;align-items:center;gap:10px;background:var(--paper);
  border:1px solid var(--border);border-radius:var(--radius-md);padding:11px 14px;
}
.player-chip .num{
  flex:none;width:26px;height:26px;border-radius:50%;background:var(--sage-500);color:#fff;
  display:inline-flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;
}
.player-chip .nm{flex:1;font-weight:600;font-size:15.5px}
.player-chip .rm{
  flex:none;background:none;border:none;color:var(--stone-light);cursor:pointer;
  font-size:20px;line-height:1;padding:2px 6px;
}
.player-chip .rm:hover{color:var(--coral-500)}

/* Progress */
.progress{font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--stone);margin:0 0 10px}
.progress .fill{color:var(--sage-600)}

/* Pass screen */
.pass-screen{text-align:center;padding:40px 0}
.pass-icon{font-size:52px;margin:0 0 10px;line-height:1}
.pass-to{font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--stone);margin:0 0 6px}
.pass-name{
  font-family:var(--font-serif);font-style:italic;font-size:clamp(34px,12vw,54px);
  color:var(--ink);margin:0 0 14px;line-height:1.05;
}
.pass-hint{font-size:15px;color:var(--graphite);max-width:40ch;margin:0 auto 26px}

/* Question display */
.q-box{
  background:var(--sage-50);border:1px solid var(--sage-100);border-radius:var(--radius-lg);
  padding:20px 22px;margin:0 0 18px;
}
.q-box .q-eyebrow{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--sage-700);margin:0 0 8px}
.q-box .q-text{font-size:19px;font-weight:600;line-height:1.4;color:var(--ink);margin:0}
.q-box.small{padding:14px 16px}
.q-box.small .q-text{font-size:15.5px;font-weight:600}

.unit-suffix{font-size:14px;color:var(--stone);margin:8px 2px 0}

/* Vote options */
.opt-list{display:flex;flex-direction:column;gap:10px;margin:16px 0 20px}
.opt{
  display:flex;align-items:center;gap:12px;text-align:left;width:100%;
  background:var(--snow);border:1.5px solid var(--border);border-radius:var(--radius-md);
  padding:14px 16px;cursor:pointer;font-family:inherit;
  transition:border-color var(--dur),background var(--dur);
  -webkit-tap-highlight-color:transparent;
}
.opt .letter{
  flex:none;width:32px;height:32px;border-radius:50%;background:var(--paper);color:var(--graphite);
  display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;
}
.opt .val{font-size:17px;font-weight:700;color:var(--ink)}
.opt.selected{border-color:var(--coral-500);background:var(--coral-50)}
.opt.selected .letter{background:var(--coral-500);color:#fff}
.opt.disabled{opacity:.45;cursor:not-allowed}
.opt .own-note{font-size:12.5px;color:var(--stone);margin-left:auto;font-weight:600}

/* Reveal list */
.rv-item{
  background:var(--snow);border:1.5px solid var(--border);border-radius:var(--radius-md);
  padding:14px 16px;margin:0 0 10px;
}
.rv-item.truth{border-color:var(--sage-500);background:var(--sage-50)}
.rv-top{display:flex;align-items:center;gap:10px;margin:0 0 4px}
.rv-top .letter{
  flex:none;width:28px;height:28px;border-radius:50%;background:var(--paper);color:var(--graphite);
  display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;
}
.rv-item.truth .rv-top .letter{background:var(--sage-500);color:#fff}
.rv-top .val{font-size:16.5px;font-weight:700}
.rv-top .badge{
  margin-left:auto;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  background:var(--sage-500);color:#fff;border-radius:var(--radius-pill);padding:3px 10px;
}
.rv-meta{font-size:13.5px;color:var(--stone);padding-left:38px}
.rv-meta b{color:var(--graphite)}

/* Scoreboard */
.score-list{display:flex;flex-direction:column;gap:8px;margin:14px 0 0}
.score-row{
  display:flex;align-items:center;gap:12px;background:var(--paper);
  border-radius:var(--radius-md);padding:12px 15px;
}
.score-row .rank{flex:none;width:24px;text-align:center;font-weight:700;color:var(--stone);font-size:14px}
.score-row .nm{flex:1;font-weight:600;font-size:15.5px}
.score-row .pts{font-weight:700;font-size:17px;color:var(--sage-700);font-variant-numeric:tabular-nums}
.score-row .delta{font-size:13px;font-weight:700;color:var(--coral-600);margin-left:6px}
.score-row.first{background:linear-gradient(90deg,var(--sage-50),var(--paper));border:1px solid var(--sage-100)}

.top-bar{display:flex;justify-content:space-between;align-items:center;margin:0 0 6px}
.link-btn{background:none;border:none;color:var(--stone-light);font-size:13px;cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:6px}
.link-btn:hover{color:var(--stone)}

.rules-toggle{background:none;border:none;color:var(--sage-700);font-weight:600;font-size:14.5px;cursor:pointer;padding:2px 0;text-decoration:underline;text-underline-offset:3px}
.rules-body{margin-top:10px}
.rules-body ol{margin:0;padding-left:20px;color:var(--graphite);font-size:14.5px;line-height:1.7}

footer.site{
  margin:36px 0 0;padding:20px 0 10px;border-top:1px solid var(--border);
  font-size:13.5px;color:var(--stone);
}

.center{text-align:center}
.emoji-big{font-size:44px;line-height:1;margin:0 0 6px}
.podium{margin:10px 0 22px}
.podium .pl{font-size:15px;color:var(--graphite);margin:4px 0}
.podium .pl b{color:var(--ink)}
</style>
</head>
<body>

<div class="wrap">
  <header class="site"><div class="brand">
    <span class="wordmark">Kilian Fäustle</span>
    <span class="tag" id="top-tag"></span>
  </div></header>

  <main id="app"></main>

  <footer class="site">
    <span class="wordmark">Kilian Fäustle</span><br>
    kilianf.de
  </footer>
</div>

<script>
'use strict';
const $ = id => document.getElementById(id);
const app = $('app');
const STORAGE_KEY = 'nobodysperfect_v1';

const QUESTIONS = [
  {q:"Wie viele Treppenstufen hat der Eiffelturm?", a:1665, unit:"Stufen"},
  {q:"Wie hoch ist der Mount Everest (in Metern)?", a:8849, unit:"m"},
  {q:"Wie viele Knochen hat ein erwachsener Mensch?", a:206, unit:"Knochen"},
  {q:"Wie lang ist die Chinesische Mauer (in km)?", a:21196, unit:"km"},
  {q:"Wie lang ist der Nil, der längste Fluss der Welt (in km)?", a:6650, unit:"km"},
  {q:"Wie viele Herzen hat ein Oktopus?", a:3, unit:"Herzen"},
  {q:"Wie schnell kann ein Gepard maximal laufen (in km/h)?", a:110, unit:"km/h"},
  {q:"Wie viele Länder sind aktuell Mitglied der Vereinten Nationen?", a:193, unit:"Länder"},
  {q:"Wie viele Zeitzonen hat Russland?", a:11, unit:"Zeitzonen"},
  {q:"Wie hoch ist der Burj Khalifa in Dubai, das höchste Gebäude der Welt (in Metern)?", a:828, unit:"m"},
  {q:"In welchem Jahr wurde der Eiffelturm fertiggestellt?", a:1889, unit:""},
  {q:"Wie groß ist Deutschland (in km²)?", a:357600, unit:"km²"},
  {q:"Wie hoch ist die Zugspitze, Deutschlands höchster Berg (in Metern)?", a:2962, unit:"m"},
  {q:"Wie weit ist der Mond im Schnitt von der Erde entfernt (in km)?", a:384400, unit:"km"},
  {q:"Wie viele Monde hat der Jupiter nach heutigem Kenntnisstand?", a:95, unit:"Monde"},
  {q:"Wie alt kann eine Galapagos-Riesenschildkröte maximal werden (in Jahren)?", a:150, unit:"Jahre"},
  {q:"Wie viele Zähne hat ein erwachsener Mensch inklusive Weisheitszähnen?", a:32, unit:"Zähne"},
  {q:"Wie viele Muskeln hat der Mensch ungefähr im Gesicht?", a:43, unit:"Muskeln"},
  {q:"Wie viele Liter Blut pumpt das menschliche Herz ungefähr pro Tag?", a:7500, unit:"Liter"},
  {q:"Wie viele Eier legt ein Huhn im Schnitt pro Jahr?", a:300, unit:"Eier"},
  {q:"Wie viele Kilometer Blutgefäße hat der menschliche Körper ungefähr?", a:100000, unit:"km"},
  {q:"Wie viele Menschen leben ungefähr im Großraum Tokio (in Millionen)?", a:37, unit:"Mio."},
  {q:"Wie viele aktive Wörter umfasst der Wortschatz eines durchschnittlichen Erwachsenen ungefähr?", a:16000, unit:"Wörter"},
  {q:"Wie viele Sprachen werden weltweit ungefähr gesprochen?", a:7000, unit:"Sprachen"},
  {q:"Wie hoch ist der höchste Wasserfall der Welt, der Angel Falls (in Metern)?", a:979, unit:"m"},
  {q:"Wie viele Stunden dauert ein Tag auf dem Planeten Venus (in Erdstunden)?", a:5832, unit:"Std."},
  {q:"Wie viele Kilometer legt das Space Shuttle in einer Erdumlaufbahn pro Stunde zurück (in km/h)?", a:28000, unit:"km/h"},
  {q:"Wie viele olympische Sommerspiele haben bisher stattgefunden (Stand 2024)?", a:33, unit:"Spiele"},
  {q:"Wie viele Einwohner hat die Vatikanstadt, der kleinste Staat der Welt, ungefähr?", a:800, unit:"Einwohner"},
  {q:"Wie schnell kann ein Blitz theoretisch sein Ziel erreichen (in km/s)?", a:100000, unit:"km/s"},
  {q:"Wie viele Kilogramm wiegt das Herz eines Blauwals ungefähr?", a:180, unit:"kg"},
  {q:"Wie viele Kilometer misst die Küstenlinie Norwegens inklusive Fjorde ungefähr?", a:100000, unit:"km"},
  {q:"Wie viele Bücher umfasst die Bibliothek des US-Kongresses ungefähr (in Millionen)?", a:170, unit:"Mio."},
  {q:"Wie viele Golfbälle passen theoretisch in einen ausgewachsenen Wal-Blauwal (kuriose Schätzfrage, in Tausend)?", a:600, unit:"Tsd."},
];

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function fmt(n){ return n.toLocaleString('de-DE'); }

let state = loadState() || freshState();

function freshState(){
  return {
    phase: 'setup',       // setup | intro | bluff-pass | bluff-input | vote-pass | vote-input | reveal | final
    players: [],          // {name, score}
    roundsPlan: [],        // array of question objects for this game
    roundIndex: 0,
    bluffs: [],            // per player, value or null
    collectIdx: 0,          // index into players during bluff/vote collection
    groups: null,           // built at vote time
    votes: [],              // per player, group id or null
    selectedGroupId: null,  // transient UI selection during vote-input
    rulesOpen: false,
  };
}
function saveState(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} }
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const s = JSON.parse(raw);
    if(s && s.players && s.players.length>=3) return s;
    return null;
  }catch(e){ return null; }
}
function resetGame(){
  if(state.phase !== 'setup' && !confirm('Aktuelles Spiel wirklich beenden und neu starten?')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = freshState();
  render();
}

// ---------- Setup ----------
let setupNameDraft = '';
function addPlayer(){
  const input = $('new-player-name');
  const name = (input.value || '').trim();
  if(!name) return;
  if(state.players.some(p=>p.name.toLowerCase()===name.toLowerCase())) { input.value=''; return; }
  if(state.players.length >= 10) return;
  state.players.push({name, score:0});
  input.value = '';
  saveState();
  render();
  const el = $('new-player-name');
  if(el) el.focus();
}
function removePlayer(i){
  state.players.splice(i,1);
  saveState();
  render();
}
function startGame(){
  if(state.players.length < 3) return;
  const roundsSelect = $('rounds-select');
  const count = roundsSelect.value === 'all' ? QUESTIONS.length : Math.min(parseInt(roundsSelect.value,10), QUESTIONS.length);
  state.roundsPlan = shuffle(QUESTIONS).slice(0, count);
  state.roundIndex = 0;
  state.players.forEach(p=>p.score=0);
  state.phase = 'intro';
  saveState();
  render();
}
function toggleRules(){
  state.rulesOpen = !state.rulesOpen;
  render();
}

function renderSetup(){
  return `
    <h1>Nobody's <em>Perfect</em></h1>
    <p class="lede">Ein Handy, eine Gruppe, ein Abend. Bei jeder Frage schätzt jede:r heimlich eine Antwort. Wer die anderen mit seinem Bluff reinlegt, sammelt Punkte &mdash; wer die echte Antwort errät, auch.</p>

    <div class="card">
      <h2>Mitspieler:innen</h2>
      <p>Mindestens 3, bis zu 10. Reihenfolge ist egal.</p>
      <div class="row">
        <input type="text" id="new-player-name" placeholder="Name eingeben" maxlength="20"
          onkeydown="if(event.key==='Enter'){event.preventDefault();addPlayer();}">
        <button class="btn coral small" style="width:auto" onclick="addPlayer()">+ Add</button>
      </div>
      <div class="player-list">
        ${state.players.map((p,i)=>`
          <div class="player-chip">
            <span class="num">${i+1}</span>
            <span class="nm">${escapeHtml(p.name)}</span>
            <button class="rm" onclick="removePlayer(${i})" aria-label="Entfernen">&times;</button>
          </div>
        `).join('') || '<p style="color:var(--stone-light);font-size:14.5px;margin:8px 0 0">Noch niemand dabei.</p>'}
      </div>
    </div>

    <div class="card">
      <h2>Anzahl Fragen</h2>
      <select id="rounds-select">
        <option value="5">5 Fragen (schnelle Runde)</option>
        <option value="8" selected>8 Fragen (empfohlen)</option>
        <option value="12">12 Fragen (langer Abend)</option>
        <option value="all">Alle ${QUESTIONS.length} Fragen</option>
      </select>
    </div>

    <button class="btn" ${state.players.length<3?'disabled':''} onclick="startGame()">
      Spiel starten${state.players.length<3?' (min. 3 Spieler)':''}
    </button>

    <div class="card" style="margin-top:16px">
      <button class="rules-toggle" onclick="toggleRules()">${state.rulesOpen?'Regeln ausblenden':'Wie wird gespielt?'}</button>
      ${state.rulesOpen ? `
        <div class="rules-body">
          <ol>
            <li>Eine Wissensfrage mit einer Zahl als Antwort erscheint &mdash; z.B. "Wie viele Stufen hat der Eiffelturm?"</li>
            <li>Das Handy geht reihum: jede:r tippt heimlich eine eigene Schätzung ein (auch wenn ihr die echte Antwort nicht kennt &mdash; einfach bluffen!).</li>
            <li>Alle Antworten inkl. der echten werden gemischt angezeigt. Reihum stimmt jede:r heimlich ab, welche Antwort die echte ist.</li>
            <li>Punkte: +2 für alle, die die echte Antwort finden. +1 pro Person, die auf deinen Bluff reingefallen ist.</li>
            <li>Nach der letzten Frage gewinnt, wer die meisten Punkte hat.</li>
          </ol>
        </div>
      ` : ''}
    </div>
  `;
}

// ---------- Round intro ----------
function beginBluffCollection(){
  state.bluffs = state.players.map(()=>null);
  state.collectIdx = 0;
  state.phase = 'bluff-pass';
  saveState();
  render();
}
function currentQuestion(){ return state.roundsPlan[state.roundIndex]; }

function renderIntro(){
  const q = currentQuestion();
  return `
    ${topBar()}
    <p class="progress">Frage <span class="fill">${state.roundIndex+1}</span> von ${state.roundsPlan.length}</p>
    <div class="q-box">
      <p class="q-eyebrow">Die Frage</p>
      <p class="q-text">${escapeHtml(q.q)}</p>
    </div>
    <p class="lede" style="font-size:15px">Alle schauen jetzt gemeinsam auf die Frage. Dann geht das Handy reihum &mdash; jede:r gibt heimlich eine Schätzung ab.</p>
    <button class="btn" onclick="beginBluffCollection()">Bluffs abgeben &rarr;</button>
  `;
}

// ---------- Bluff collection ----------
function revealBluffInput(){
  state.phase = 'bluff-input';
  saveState();
  render();
  setTimeout(()=>{ const el = $('bluff-value'); if(el) el.focus(); }, 30);
}
function submitBluff(){
  const el = $('bluff-value');
  const val = parseFloat((el.value||'').replace(',','.'));
  if(isNaN(val)) return;
  state.bluffs[state.collectIdx] = Math.round(val);
  state.collectIdx++;
  if(state.collectIdx >= state.players.length){
    beginVoteCollection();
  } else {
    state.phase = 'bluff-pass';
    saveState();
    render();
  }
}

function renderBluffPass(){
  const p = state.players[state.collectIdx];
  return `
    ${topBar()}
    <div class="pass-screen">
      <div class="pass-icon">📱</div>
      <p class="pass-to">Handy weitergeben an</p>
      <p class="pass-name">${escapeHtml(p.name)}</p>
      <p class="pass-hint">Trag deine Schätzung ein, ohne dass die anderen mitlesen. Kennst du die Antwort nicht &mdash; einfach einen glaubwürdigen Bluff eintippen!</p>
      <button class="btn coral" onclick="revealBluffInput()">Ich bin bereit</button>
    </div>
  `;
}
function renderBluffInput(){
  const q = currentQuestion();
  const p = state.players[state.collectIdx];
  return `
    ${topBar()}
    <p class="progress"><span class="fill">${escapeHtml(p.name)}</span> ist dran</p>
    <div class="q-box small">
      <p class="q-text">${escapeHtml(q.q)}</p>
    </div>
    <input type="number" inputmode="decimal" id="bluff-value" placeholder="Deine Schätzung"
      onkeydown="if(event.key==='Enter'){event.preventDefault();submitBluff();}">
    ${q.unit ? `<p class="unit-suffix">Einheit: ${escapeHtml(q.unit)}</p>` : ''}
    <div style="height:16px"></div>
    <button class="btn" onclick="submitBluff()">Weiter</button>
  `;
}

// ---------- Vote collection ----------
function buildGroups(){
  const q = currentQuestion();
  const map = new Map();
  state.bluffs.forEach((val, idx)=>{
    if(!map.has(val)) map.set(val, {value:val, authorIdx:[], isTruth:false});
    map.get(val).authorIdx.push(idx);
  });
  if(!map.has(q.a)) map.set(q.a, {value:q.a, authorIdx:[], isTruth:false});
  map.get(q.a).isTruth = true;
  const groups = shuffle(Array.from(map.values()));
  groups.forEach((g,i)=>{ g.id = String.fromCharCode(65+i); });
  return groups;
}
function beginVoteCollection(){
  state.groups = buildGroups();
  state.votes = state.players.map(()=>null);
  state.collectIdx = 0;
  advanceToNextVoter(true);
}
function advanceToNextVoter(fromStart){
  if(!fromStart) state.collectIdx++;
  while(state.collectIdx < state.players.length){
    const eligible = state.groups.filter(g=>!g.authorIdx.includes(state.collectIdx));
    if(eligible.length === 0){
      // nothing to vote on (all groups are their own) — skip silently
      state.votes[state.collectIdx] = null;
      state.collectIdx++;
      continue;
    }
    break;
  }
  if(state.collectIdx >= state.players.length){
    state.phase = 'reveal';
    computeScores();
    saveState();
    render();
    return;
  }
  state.phase = 'vote-pass';
  state.selectedGroupId = null;
  saveState();
  render();
}
function revealVoteInput(){
  state.phase = 'vote-input';
  saveState();
  render();
}
function selectGroup(id){
  const g = state.groups.find(g=>g.id===id);
  if(g.authorIdx.includes(state.collectIdx)) return;
  state.selectedGroupId = id;
  render();
}
function submitVote(){
  if(!state.selectedGroupId) return;
  state.votes[state.collectIdx] = state.selectedGroupId;
  advanceToNextVoter(false);
}

function renderVotePass(){
  const p = state.players[state.collectIdx];
  return `
    ${topBar()}
    <div class="pass-screen">
      <div class="pass-icon">🗳️</div>
      <p class="pass-to">Handy weitergeben an</p>
      <p class="pass-name">${escapeHtml(p.name)}</p>
      <p class="pass-hint">Wähle heimlich, welche Antwort du für die echte hältst.</p>
      <button class="btn coral" onclick="revealVoteInput()">Ich bin bereit</button>
    </div>
  `;
}
function renderVoteInput(){
  const q = currentQuestion();
  const p = state.players[state.collectIdx];
  return `
    ${topBar()}
    <p class="progress"><span class="fill">${escapeHtml(p.name)}</span> stimmt ab</p>
    <div class="q-box small">
      <p class="q-text">${escapeHtml(q.q)}</p>
    </div>
    <div class="opt-list">
      ${state.groups.map(g=>{
        const isOwn = g.authorIdx.includes(state.collectIdx);
        const sel = state.selectedGroupId === g.id;
        return `
          <button class="opt ${sel?'selected':''} ${isOwn?'disabled':''}" ${isOwn?'disabled':''} onclick="selectGroup('${g.id}')">
            <span class="letter">${g.id}</span>
            <span class="val">${fmt(g.value)}${q.unit?(' '+escapeHtml(q.unit)):''}</span>
            ${isOwn?'<span class="own-note">Deine Antwort</span>':''}
          </button>
        `;
      }).join('')}
    </div>
    <button class="btn" ${state.selectedGroupId?'':'disabled'} onclick="submitVote()">Stimme bestätigen</button>
  `;
}

// ---------- Scoring & reveal ----------
function computeScores(){
  const delta = state.players.map(()=>0);
  const notes = state.players.map(()=>[]);
  state.groups.forEach(g=>{
    const voters = state.votes.map((v,i)=>v===g.id?i:null).filter(i=>i!==null);
    if(g.isTruth){
      voters.forEach(i=>{ delta[i]+=2; notes[i].push('+2 richtige Antwort gefunden'); });
      g.authorIdx.forEach(i=>{ delta[i]+=2; notes[i].push('+2 Volltreffer mit dem eigenen Bluff'); });
    } else if(voters.length>0){
      g.authorIdx.forEach(i=>{
        delta[i]+=voters.length;
        notes[i].push(`+${voters.length} ${voters.length===1?'Person ist':'Personen sind'} auf deinen Bluff reingefallen`);
      });
    }
    g.voteCount = voters.length;
  });
  state.players.forEach((p,i)=>{ p.score += delta[i]; });
  state.roundDelta = delta;
  state.roundNotes = notes;
}
function nextRound(){
  state.roundIndex++;
  if(state.roundIndex >= state.roundsPlan.length){
    state.phase = 'final';
  } else {
    state.phase = 'intro';
  }
  saveState();
  render();
}

function renderReveal(){
  const q = currentQuestion();
  const sortedGroups = state.groups.slice().sort((a,b)=> (b.isTruth?1:0)-(a.isTruth?1:0));
  const scoreOrder = state.players.map((p,i)=>({p,i})).sort((a,b)=>b.p.score-a.p.score);
  const isLast = state.roundIndex >= state.roundsPlan.length-1;
  return `
    ${topBar()}
    <p class="progress">Auflösung &middot; Frage ${state.roundIndex+1} von ${state.roundsPlan.length}</p>
    <div class="q-box">
      <p class="q-eyebrow">Richtige Antwort</p>
      <p class="q-text">${fmt(q.a)}${q.unit?(' '+escapeHtml(q.unit)):''}</p>
    </div>
    ${sortedGroups.map(g=>{
      const authors = g.authorIdx.map(i=>state.players[i].name);
      return `
        <div class="rv-item ${g.isTruth?'truth':''}">
          <div class="rv-top">
            <span class="letter">${g.id}</span>
            <span class="val">${fmt(g.value)}${q.unit?(' '+escapeHtml(q.unit)):''}</span>
            ${g.isTruth?'<span class="badge">Richtig</span>':''}
          </div>
          <p class="rv-meta">
            ${authors.length ? `<b>${authors.map(escapeHtml).join(', ')}</b> ${authors.length===1?'hat':'haben'} das${g.isTruth?' exakt getroffen':' geschätzt'}. ` : (g.isTruth?'Von niemandem geraten. ':'')}
            ${g.voteCount>0 ? `${g.voteCount} ${g.voteCount===1?'Stimme':'Stimmen'} erhalten.` : 'Keine Stimmen.'}
          </p>
        </div>
      `;
    }).join('')}

    <h2 style="font-family:var(--font-sans);font-size:16px;margin:20px 0 8px">Punktestand</h2>
    <div class="score-list">
      ${scoreOrder.map(({p,i})=>`
        <div class="score-row">
          <span class="nm">${escapeHtml(p.name)}</span>
          <span class="pts">${p.score}</span>
          ${state.roundDelta[i]>0?`<span class="delta">+${state.roundDelta[i]}</span>`:''}
        </div>
      `).join('')}
    </div>

    <div style="height:18px"></div>
    <button class="btn" onclick="nextRound()">${isLast?'Endergebnis anzeigen':'Nächste Frage'} &rarr;</button>
  `;
}

// ---------- Final ----------
function renderFinal(){
  const ranked = state.players.slice().sort((a,b)=>b.score-a.score);
  const medals = ['🥇','🥈','🥉'];
  return `
    ${topBar()}
    <div class="center">
      <div class="emoji-big">🏆</div>
      <h1 style="font-size:34px;margin:0 0 6px">Spiel <em>vorbei</em></h1>
      <p class="lede" style="margin:0 auto 4px">${escapeHtml(ranked[0].name)} gewinnt mit ${ranked[0].score} Punkten!</p>
    </div>
    <div class="score-list" style="margin-top:20px">
      ${ranked.map((p,i)=>`
        <div class="score-row ${i===0?'first':''}">
          <span class="rank">${medals[i]||(i+1)}</span>
          <span class="nm">${escapeHtml(p.name)}</span>
          <span class="pts">${p.score}</span>
        </div>
      `).join('')}
    </div>
    <div style="height:20px"></div>
    <button class="btn" onclick="playAgain()">Neues Spiel</button>
  `;
}
function playAgain(){
  const keepPlayers = state.players.map(p=>({name:p.name, score:0}));
  state = freshState();
  state.players = keepPlayers;
  saveState();
  render();
}

// ---------- Shared bits ----------
function topBar(){
  return `
    <div class="top-bar">
      <span class="tag">${escapeHtml((state.roundsPlan||[]).length ? `Runde ${Math.min(state.roundIndex+1,state.roundsPlan.length)}/${state.roundsPlan.length}` : '')}</span>
      <button class="link-btn" onclick="resetGame()">Spiel beenden</button>
    </div>
  `;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(){
  $('top-tag').textContent = state.phase==='setup' ? "Nobody's Perfect" : '';
  let html = '';
  switch(state.phase){
    case 'setup': html = renderSetup(); break;
    case 'intro': html = renderIntro(); break;
    case 'bluff-pass': html = renderBluffPass(); break;
    case 'bluff-input': html = renderBluffInput(); break;
    case 'vote-pass': html = renderVotePass(); break;
    case 'vote-input': html = renderVoteInput(); break;
    case 'reveal': html = renderReveal(); break;
    case 'final': html = renderFinal(); break;
    default: html = renderSetup();
  }
  app.innerHTML = html;
}

render();
</script>
</body>
</html>
